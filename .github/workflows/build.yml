name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Generate Release Keystore
      run: |
        STOREPASS="${{ secrets.KEYSTORE_PASSWORD }}"
        KEYPASS="${{ secrets.KEY_PASSWORD }}"
        # Use default passwords if secrets are not set
        STOREPASS="${STOREPASS:-changeme}"
        KEYPASS="${KEYPASS:-changeme}"

        keytool -genkeypair \
          -keystore app/release-keystore.jks \
          -alias release \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Home Launcher, OU=Development, O=Vincent Chao, L=Shanghai, ST=Shanghai, C=CN" \
          -storepass "$STOREPASS" \
          -keypass "$KEYPASS"

    - name: Create keystore properties
      run: |
        STOREPASS="${{ secrets.KEYSTORE_PASSWORD }}"
        KEYPASS="${{ secrets.KEY_PASSWORD }}"
        KEYALIAS="${{ secrets.KEY_ALIAS }}"
        # Use default values if secrets are not set
        STOREPASS="${STOREPASS:-changeme}"
        KEYPASS="${KEYPASS:-changeme}"
        KEYALIAS="${KEYALIAS:-release}"

        echo "RELEASE_KEYSTORE_FILE=release-keystore.jks" > app/keystore.properties
        echo "RELEASE_KEYSTORE_PASSWORD=$STOREPASS" >> app/keystore.properties
        echo "RELEASE_KEY_ALIAS=$KEYALIAS" >> app/keystore.properties
        echo "RELEASE_KEY_PASSWORD=$KEYPASS" >> app/keystore.properties

    - name: Build Release APK
      run: gradle assembleRelease --no-daemon

    - name: Sign APK (optional - debug only)
      run: |
        echo "APK built successfully"
        ls -lh app/build/outputs/apk/

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Release APK (on push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        tag_name: v${{ github.run_number }}
        name: Release Build ${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
