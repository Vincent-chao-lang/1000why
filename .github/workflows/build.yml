name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Create keystore properties for release
      run: |
        echo "RELEASE_KEYSTORE_FILE=release-keystore.jks" > app/keystore.properties
        echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> app/keystore.properties
        echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> app/keystore.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> app/keystore.properties

    - name: Import keystore from secrets
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > app/release-keystore.jks

    - name: Build Release APK
      run: gradle assembleRelease --no-daemon

    - name: Sign APK (optional - debug only)
      run: |
        echo "APK built successfully"
        ls -lh app/build/outputs/apk/

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Release APK (on push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        tag_name: v${{ github.run_number }}
        name: Release Build ${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
