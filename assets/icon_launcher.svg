<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景: 深蓝色渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6200EE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGradient)"/>

  <!-- 麦克风图标 -->
  <g transform="translate(256, 220)">
    <!-- 麦克风主体 -->
    <rect x="-45" y="-80" width="90" height="140" rx="45" ry="45" fill="#ffffff"/>
    <!-- 麦克风网格线 -->
    <line x1="-45" y1="-40" x2="45" y2="-40" stroke="#6200EE" stroke-width="3"/>
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#6200EE" stroke-width="3"/>
    <line x1="-45" y1="40" x2="45" y2="40" stroke="#6200EE" stroke-width="3"/>
    <!-- 麦克风支架 -->
    <path d="M -20 70 L -20 100 Q -20 120 0 120 Q 20 120 20 100 L 20 70" fill="none" stroke="#ffffff" stroke-width="8"/>
    <!-- 底座 -->
    <rect x="-35" y="120" width="70" height="12" rx="6" ry="6" fill="#ffffff"/>
  </g>

  <!-- AI 光环效果 -->
  <circle cx="256" cy="220" r="100" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="220" r="120" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

  <!-- 底部文字 -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">HOME</text>
  <text x="256" y="455" font-family="Arial, sans-serif" font-size="42" font-weight="normal" fill="#cccccc" text-anchor="middle">AI</text>
</svg>
